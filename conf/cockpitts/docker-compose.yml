services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: cockpitts_nginx
    depends_on:
      - php
      - mysql
      - redis
      - queue_worker
    volumes:
      - ./:/var/www/html
    networks:
      - default
      - backend  

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        uid: ${UID:?UID not set}
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: cockpitts_php
    volumes:
      - ./:/var/www/html
    networks:
      - default
      - backend  

  mysql:
    image: mysql:${MYSQL_VERSION:-8.3}
    container_name: cockpitts_mysql
    ports:
      - 3307:3306
    volumes:
      - mysql:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}

  composer:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        uid: ${UID:?UID not set}
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: cockpitts_composer
    user: ${UID:?UID not set}
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["composer"]

  artisan:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        uid: ${UID:?UID not set}
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: cockpitts_artisan
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["php", "artisan"]
    networks:
      - default
      - backend

  npm:
    image: node:${NODE_VERSION:-22}
    container_name: cockpitts_npm
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    user: ${UID:?UID not set}
    entrypoint: ["npm"]
    environment:
      - HOME=/var/www/html

  phpunit:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        uid: ${UID:?UID not set}
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: cockpitts_phpunit
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["/var/www/html/vendor/bin/phpunit"]

  redis:
    image: redis:latest
    container_name: cockpitts_redis
    ports:
      - 6379:6379

  scheduler:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        uid: ${UID:?UID not set}
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: cockpitts_scheduler
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["php", "artisan", "schedule:work"]

  queue_worker:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        uid: ${UID:?UID not set}
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: cockpitts_queue_worker
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    environment:
      - QUEUE_CONNECTION=redis
    depends_on:
      - redis
  phpmyadmin: 
    image: phpmyadmin/phpmyadmin
    container_name: cockpitts_phpmyadmin
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - 8081:80
volumes:
  mysql:

networks:
  default: {}
  backend:
    external: true