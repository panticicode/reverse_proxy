events {}

http {
    # IsleBlue aplikacija - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name isleblue.local;  # ← SAMO isleblue.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # StMartinBlue aplikacija - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name stmartinblue.local;  # ← SAMO isleblue.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # StBartsBlue aplikacija - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name stbartsblue.local;  # ← SAMO isleblue.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # BarbadosBlue aplikacija - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name barbadosblue.local;  # ← SAMO barbados.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # IsleBlue phpMyAdmin - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name phpmyadmin.isleblue.local;  # ← POSEBNI server block
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name api.isleblue.local;  # ← SAMO api.isleblue.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name manage.isleblue.local;  # ← SAMO manage.isleblue.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # IsleBlue aplikacija - HTTPS
    server {
        listen 443 ssl;
        server_name isleblue.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/isleblue.local+6.pem;
        ssl_certificate_key /etc/nginx/certs/isleblue.local+6-key.pem;
        
        location / {
            proxy_pass http://isleblue_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # StMartinBlue aplikacija - HTTPS
    server {
        listen 443 ssl;
        server_name stmartinblue.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/isleblue.local+6.pem;
        ssl_certificate_key /etc/nginx/certs/isleblue.local+6-key.pem;
        
        location / {
            proxy_pass http://stmartinblue_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # StBartsBlue aplikacija - HTTPS
    server {
        listen 443 ssl;
        server_name stbartsblue.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/isleblue.local+6.pem;
        ssl_certificate_key /etc/nginx/certs/isleblue.local+6-key.pem;
        
        location / {
            proxy_pass http://stbartsblue_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

     # BarbadosBlue aplikacija - HTTPS
    server {
        listen 443 ssl;
        server_name barbadosblue.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/isleblue.local+6.pem;
        ssl_certificate_key /etc/nginx/certs/isleblue.local+6-key.pem;
        
        location / {
            proxy_pass http://barbadosblue_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # IsleBlue phpMyAdmin - HTTPS
    server {
        listen 443 ssl;
        server_name phpmyadmin.isleblue.local;
        
        client_max_body_size 100M;

        ssl_certificate /etc/nginx/certs/isleblue.local+6.pem;
        ssl_certificate_key /etc/nginx/certs/isleblue.local+6-key.pem;
        
        location / {
            proxy_pass http://isleblue_phpmyadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name api.isleblue.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/isleblue.local+6.pem;
        ssl_certificate_key /etc/nginx/certs/isleblue.local+6-key.pem;
        
        location / {
            proxy_pass http://isleblue_api_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name manage.isleblue.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/isleblue.local+6.pem;
        ssl_certificate_key /etc/nginx/certs/isleblue.local+6-key.pem;
        
        location / {
            proxy_pass http://isleblue_manage_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}