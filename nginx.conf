events {}

http {
    # Suite aplikacija - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name suite.local;  # ← SAMO suite.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # Suite phpMyAdmin - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name phpmyadmin.suite.local;  # ← POSEBNI server block
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name dev.suite.local;  # ← SAMO dev.suite.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name phpmyadmin.dev.suite.local;  # ← POSEBNI server block
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name demo.suite.local;  # ← SAMO demo.suite.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name phpmyadmin.demo.suite.local;  # ← POSEBNI server block
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # Cockpit aplikacija - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name cockpitts.local;  # ← SAMO cockpitts.local
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # Cockpit phpMyAdmin - HTTP to HTTPS redirect
    server {
        listen 80;
        server_name phpmyadmin.cockpitts.local;  # ← POSEBNI server block
        client_max_body_size 10M;
        return 301 https://$server_name$request_uri;
    }

    # Suite aplikacija - HTTPS
    server {
        listen 443 ssl;
        server_name suite.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://suite_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Suite phpMyAdmin - HTTPS
    server {
        listen 443 ssl;
        server_name phpmyadmin.suite.local;
        
        client_max_body_size 100M;

        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://suite_phpmyadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name dev.suite.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://suite-dev_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name phpmyadmin.dev.suite.local;
        
        client_max_body_size 100M;

        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://suite-dev_phpmyadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name demo.suite.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://suite-demo_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name phpmyadmin.demo.suite.local;
        
        client_max_body_size 100M;

        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://suite-demo_phpmyadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Cockpit aplikacija - HTTPS
    server {
        listen 443 ssl;
        server_name cockpitts.local;
        
        client_max_body_size 10M;

        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://cockpitts_nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Cockpit phpMyAdmin - HTTPS
    server {
        listen 443 ssl;
        server_name phpmyadmin.cockpitts.local;
        
        client_max_body_size 100M;
        
        ssl_certificate /etc/nginx/certs/suite.local+7.pem;
        ssl_certificate_key /etc/nginx/certs/suite.local+7-key.pem;
        
        location / {
            proxy_pass http://cockpitts_phpmyadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}